{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 85vh; padding: 20px;">
    <div class="form-card" style="background: #1e293b; padding: 40px; border-radius: 20px; width: 100%; max-width: 550px; border: 1px solid #334155; box-shadow: 0 20px 40px rgba(0,0,0,0.4);">
        
        <h2 style="color: #fff; margin-bottom: 25px; text-align: center;">
            <i class="fas fa-file-upload" style="color: #3b82f6;"></i> Upload Document
        </h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-grid" style="display: grid; gap: 20px;">
                <div class="form-group">
                    <label style="display: block; color: #94a3b8; margin-bottom: 8px; font-size: 0.85rem;">Select Vehicle</label>
                    {{ form.vehicleId }}
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label style="display: block; color: #94a3b8; margin-bottom: 8px; font-size: 0.85rem;">Document Type</label>
                        {{ form.doc_type }}
                    </div>
                    <div class="form-group">
                        <label style="display: block; color: #94a3b8; margin-bottom: 8px; font-size: 0.85rem;">Expiry Date</label>
                        {{ form.expiry_date }}
                    </div>
                </div>

                <div class="form-group">
                    <label style="display: block; color: #94a3b8; margin-bottom: 8px; font-size: 0.85rem;">Document Number</label>
                    {{ form.doc_number }}
                </div>

                <div class="form-group" style="background: #0f172a; padding: 15px; border-radius: 8px; border: 1px dashed #334155;">
                    <label style="display: block; color: #3b82f6; margin-bottom: 10px; font-weight: 600;">File Upload</label>
                    {{ form.doc_file }}
                </div>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; padding: 14px; border-radius: 10px; font-weight: 700; border: none; margin-top: 30px; cursor: pointer; background: #3b82f6; color: white;">
                Save to Vault
            </button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <a href="{% url 'document_list' %}" style="color: #94a3b8; text-decoration: none; font-size: 0.9rem;">
                <i class="fas fa-arrow-left"></i> Back to Documents
            </a>
        </div>
    </div>
</div>

<style>
    /* Global styling for Django form fields on this page */
    input, select {
        width: 100%;
        padding: 12px;
        background: #0f172a !important;
        border: 1px solid #334155 !important;
        color: #fff !important;
        border-radius: 8px;
        outline: none;
    }
    input:focus, select:focus { border-color: #3b82f6 !important; }
    
    /* Specific styling for the file input */
    input[type="file"] {
        background: transparent !important;
        border: none !important;
        color: #94a3b8;
        padding: 0;
    }
</style>
{% endblock %}
