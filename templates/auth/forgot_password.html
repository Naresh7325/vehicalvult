{% extends "base.html" %}

{% block content %}
<div style="display:flex; justify-content:center; align-items:center; min-height:85vh;">

    <div style="
        background:#1e293b;
        padding:40px;
        border-radius:20px;
        width:100%;
        max-width:450px;
        border:1px solid #334155;
        box-shadow:0 20px 40px rgba(0,0,0,0.4);
    ">

        <h2 style="color:#fff; text-align:center; margin-bottom:25px;">
            🔐 Forgot Password
        </h2>

        {% if messages %}
            {% for message in messages %}
                <p style="color: #22c55e; text-align:center;">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label style="color:#94a3b8;">Username</label>
            <input type="text" name="username" required style="
                width:100%;
                padding:12px;
                margin:10px 0 20px;
                border-radius:10px;
                border:1px solid #475569;
                background:#0f172a;
                color:#fff;
            ">

            <label style="color:#94a3b8;">New Password</label>
            <input type="password" name="password" required style="
                width:100%;
                padding:12px;
                margin:10px 0 20px;
                border-radius:10px;
                border:1px solid #475569;
                background:#0f172a;
                color:#fff;
            ">

            <button type="submit" style="
                width:100%;
                padding:12px;
                border:none;
                border-radius:12px;
                background:linear-gradient(135deg,#3b82f6,#6366f1);
                color:white;
                font-weight:600;
                cursor:pointer;
            ">
                Reset Password
            </button>
        </form>

        <div style="text-align:center; margin-top:15px;">
            <a href="{% url 'login' %}" style="color:#94a3b8;">Back to Login</a>
        </div>

    </div>
</div>
{% endblock %}
