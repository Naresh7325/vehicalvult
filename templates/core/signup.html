{% extends 'base.html' %}
{% load static %}

{% block title %}Signup | Vehicle Vault{% endblock %}

{% block content %}

<div class="signup-container">
    <div class="signup-card">
        <h2>Create Account</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="signup-btn">
                Signup
            </button>
        </form>
    </div>
</div>

{% endblock %}
