{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 20px;">
    <div class="form-card" style="background: #1e293b; padding: 40px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid #334155; box-shadow: 0 20px 40px rgba(0,0,0,0.4);">
        
        <h2 style="color: #fff; margin-bottom: 25px; text-align: center; font-weight: 700;">
            <i class="fas fa-parking" style="color: #3b82f6; margin-right: 10px;"></i>Parking Entry
        </h2>

        <form method="POST">
            {% csrf_token %}
            
            <div class="form-body" style="color: #94a3b8;">
                {% for field in form %}
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; font-size: 0.85rem; color: #94a3b8;">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <small style="color: #ef4444;">{{ field.errors|striptags }}</small>
                        {% endif %}
                    </div>
                {% endfor %}
            </div>

            <button type="submit" style="width: 100%; padding: 14px; border-radius: 10px; font-weight: 700; border: none; margin-top: 10px; cursor: pointer; background: #3b82f6; color: white; transition: 0.3s; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);">
                Save Entry
            </button>
        </form>

        <div style="text-align: center; margin-top: 25px;">
            <a href="{% url 'parking_list' %}" style="color: #94a3b8; text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <i class="fas fa-arrow-left"></i> Back to Records
            </a>
        </div>
    </div>
</div>

<style>
    /* Force styles on Django-generated inputs */
    input, select, textarea {
        width: 100% !important;
        padding: 12px !important;
        background: #0f172a !important;
        border: 1px solid #334155 !important;
        color: #fff !important;
        border-radius: 8px !important;
        outline: none !important;
    }
    input:focus, select:focus {
        border-color: #3b82f6 !important;
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    }
</style>
{% endblock %}
